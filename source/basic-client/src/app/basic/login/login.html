<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <template th:include="/common/head/head::head('登录')" th:remove="tag"></template>
</head>
<body>
<div class="login-all">
    <div class="login-from">
        <div class="login-title">
            <h3 class="text" th:text="${appName}"></h3>
        </div>
        <div class="login">
            <div class="login-head">
                <div class="password-login selected" id="passwordLogin">密码登录</div>
                <div th:if="${app['openPhoneLogin']=='0'}" class="phone-login" id="phoneLogin">手机登录</div>
                <div th:if="${app['openEmailLogin']=='0'}" class="email-login" id="emailLogin">邮箱登录</div>
            </div>
            <div class="password-login-form open" id="passwordLoginForm">
                <!--账号-->
                <div class="input-block">
                    <svg class="icon" aria-hidden="true">
                        <use xlink:href="#xc-zhanghu"></use>
                    </svg>
                    <input class="xc-input" type="text" placeholder="账号/手机号/邮箱" maxlength="60" id="account">
                    <span class="error"></span>
                </div>
                <!--密码-->
                <div class="input-block">
                    <svg class="icon" aria-hidden="true">
                        <use xlink:href="#xc-mima"></use>
                    </svg>
                    <input class="xc-input" type="password" placeholder="密码" maxlength="24" id="password">
                    <span class="error"></span>
                </div>
            </div>
            <div th:if="${app['openPhoneLogin']=='0'}" class="phone-login-form" id="phoneLoginForm">
                <!--手机号-->
                <div class="input-block">
                    <svg class="icon" aria-hidden="true">
                        <use xlink:href="#xc-zhanghu"></use>
                    </svg>
                    <input class="xc-input" type="text" placeholder="手机号" maxlength="11" id="phone">
                    <span class="error"></span>
                </div>
                <!--验证码-->
                <div class="input-block">
                    <div class=" captcha">
                        <svg class="icon" aria-hidden="true">
                            <use xlink:href="#xc-ecurityCode"></use>
                        </svg>
                        <input class="xc-input" type="text" placeholder="验证码" maxlength="6" id="phoneCaptcha">
                        <span class="error"></span>
                    </div>
                    <div class="captcha-button">
                        <button id="phoneCaptchaButton" class="xc-button" type="button">获取验证码</button>
                    </div>
                </div>
                <!--协议-->
                <div class="input-checkbox" id="phoneAgreementBlock">
                    <input class="xc-checkbox" type="checkbox" id="phoneAgreement">
                    <span>我已阅读并同意<a class="agreement userAgreement">用户协议</a>及<a class="agreement privacyAgreement">隐私协议</a></span>
                    <span class="error"></span>
                </div>
            </div>
            <div th:if="${app['openEmailLogin']=='0'}" class="email-login-form" id="emailLoginForm">
                <!--邮箱-->
                <div class="input-block">
                    <svg class="icon" aria-hidden="true">
                        <use xlink:href="#xc-zhanghu"></use>
                    </svg>
                    <input class="xc-input" type="text" placeholder="邮箱" maxlength="60" id="email">
                    <span class="error"></span>
                </div>
                <!--验证码-->
                <div class="input-block">
                    <div class=" captcha">
                        <svg class="icon" aria-hidden="true">
                            <use xlink:href="#xc-ecurityCode"></use>
                        </svg>
                        <input class="xc-input" type="text" placeholder="验证码" maxlength="6" id="emailCaptcha">
                        <span class="error"></span>
                    </div>
                    <div class="captcha-button">
                        <button id="emailCaptchaButton" class="xc-button" type="button">获取验证码</button>
                    </div>
                </div>
                <!--协议-->
                <div class="input-checkbox" id="emailAgreementBlock">
                    <input class="xc-checkbox" type="checkbox" id="emailAgreement">
                    <span>我已阅读并同意<a class="agreement userAgreement">用户协议</a>及<a class="agreement privacyAgreement">隐私协议</a></span>
                    <span class="error"></span>
                </div>
            </div>
            <div class="button-submit">
                <!--权限-->
                <div class="input-checkbox">
                    <div class="checkbox" th:each="authority, i : ${authorityList}">
                        <label>
                            <input class="authorityId" type="checkbox" checked th:value="${authority.id}">
                            <span th:text="${authority.name}">权限</span>
                        </label>
                    </div>
                </div>
                <!--按钮-->
                <div class="button-block">
                    <button id="submit" class="xc-button" type="button">登录</button>
                    <label id="rememberPasswordBlock">
                        <input id="rememberPassword" class="remember_password" type="checkbox">
                        <span>记住密码</span>
                    </label>
                </div>
                <!--注册/忘记密码-->
                <div class="button-block jump-page">
                    <a id="forgetJump">找回密码</a>
                    <a id="registerJump">注册</a>
                </div>
            </div>
        </div>
        <div style="display: none">
            <div id="appId" th:text="${appId}"></div>
            <div id="redirectUri" th:text="${redirectUri}"></div>
            <div id="state" th:text="${state}"></div>
        </div>
        <div class="eject" id="eject">
            <div class="eject-head">
                <span>获取验证码</span>
            </div>
            <div class="eject-content">
                <!--图片验证码-->
                <div class="input-block captcha-block">
                    <div class="captcha">
                        <svg class="icon" aria-hidden="true">
                            <use xlink:href="#xc-ecurityCode"></use>
                        </svg>
                        <input class="xc-input" type="text" placeholder="验证码" maxlength="6" id="imgCaptcha">
                        <span class="error"></span>
                    </div>
                    <div class="login-block-image captcha">
                        <img id="imgCaptchaImg">
                    </div>
                </div>
            </div>
            <div class="eject-footer">
                <button id="imgCaptchaConfirm" class="xc-button" type="button">确认</button>
                <button id="imgCaptchaClose" class="xc-button" type="button">取消</button>
            </div>
        </div>
    </div>
    <!--页脚-->
    <div th:include="common/footer/footer::footer" th:remove="tag"></div>
</div>
</body>
</html>
